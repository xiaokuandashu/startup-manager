name: task_wizard_mobile
description: 任务精灵手机版 — 远程控制电脑自动化任务
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0

  # Networking
  web_socket_channel: ^2.4.0
  http: ^1.2.0
  dio: ^5.4.0

  # UI
  flutter_slidable: ^3.0.0
  fl_chart: ^0.66.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0

  # Auth & Security
  local_auth: ^2.1.0
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.0

  # AI Input
  speech_to_text: ^7.0.0
  image_picker: ^1.1.0

  # Communication
  flutter_blue_plus: ^1.31.0
  permission_handler: ^11.3.0

  # Notifications
  flutter_local_notifications: ^17.0.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.0
  json_annotation: ^4.8.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.7.0
  riverpod_generator: ^2.3.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/i18n/
